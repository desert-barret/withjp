    <!-- ── Performance: DNS prefetch → preconnect ─────────────── -->
    <!--  dns-prefetch: fallback for browsers without preconnect support -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <!--  preconnect: early TLS handshake. crossorigin required for CORS fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Fonts — non-blocking (loadCSS pattern) ─────────────── -->
    <!--
      Weights trimmed to only what's used (removed 300 from Inter, 400 from Space Grotesk).
      display=swap → instant text render with system font fallback, no FOIT.
      preload as="style" + onload trick → zero render-blocking.
    -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" />
    </noscript>
