          "name": "¿Cuánto cuesta desarrollar un bot o automatización?",

            "@type": "Answer",

          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto tiempo tarda el desarrollo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un bot básico puede estar listo en 1-2 semanas. Proyectos más complejos con integraciones toman entre 3 y 6 semanas. Te doy un estimado claro antes de comenzar."
          }
        },
        {
          "@type": "Question",
          "name": "¿El bot de WhatsApp cumple con las políticas de Meta?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Trabajo únicamente con la API oficial de WhatsApp Business de Meta. Solo se envían mensajes a usuarios que han dado su consentimiento (opt-in) y se usan plantillas aprobadas por Meta."
          }
        }
      ]
    }
